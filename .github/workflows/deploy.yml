name: Deploy Worker and Commands

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/register-commands.js"
      - "package.json"
      - "package-lock.json"
      - "wrangler.toml"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Syntax check
        run: |
          node --check src/results.js
          node --check src/worker.js
          node --check src/lineup.js
          node --check scripts/register-commands.js
          node --check post-worldcup-summary.js
      - name: Deploy Worker
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Register Discord slash commands
        run: npm run register:commands
        env:
          DISCORD_APPLICATION_ID: ${{ secrets.DISCORD_APPLICATION_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
